services:
  trade-ops-sentinel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trade-ops-sentinel
    restart: unless-stopped
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - ft_userdata_default
    volumes:
      - ./data:/app/data

networks:
  ft_userdata_default:
    external: true
